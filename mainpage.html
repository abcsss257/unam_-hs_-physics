<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물리 실험 시뮬레이터 허브</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
            --text: #f1f5f9;
            --disabled: #475569;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            width: 100%;
        }

        header h1 {
            font-size: 2.8rem;
            margin: 0;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        header p {
            color: #94a3b8;
            margin-top: 15px;
            font-size: 1.2rem;
        }

        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1100px;
            width: 90%;
            padding: 40px 0;
        }

        .sim-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .sim-card:not(.pending):hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 30px -10px rgba(56, 189, 248, 0.2);
            border-color: var(--primary);
        }

        .sim-card.pending {
            border: 1px dashed #475569;
            opacity: 0.7;
            background: rgba(30, 41, 59, 0.5);
        }

        .sim-icon {
            font-size: 3.5rem;
            margin-bottom: 25px;
        }

        .sim-card h2 {
            margin: 0 0 15px 0;
            font-size: 1.6rem;
            color: var(--primary);
        }

        .sim-card.pending h2 { color: var(--disabled); }

        .sim-card p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .launch-btn {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-pending {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            pointer-events: none;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: -30px;
            background: #475569;
            color: white;
            padding: 5px 40px;
            transform: rotate(45deg);
            font-size: 0.75rem;
            font-weight: bold;
        }

        footer {
            margin-top: auto;
            padding: 50px;
            color: #475569;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>과학 물리 실험 시뮬레이터</h1>
        <p>상호작용하는 가상 실험실에서 물리 개념을 마스터하세요.</p>
    </header>

    <main class="hub-container">
        <div class="sim-card">
            <div class="sim-icon">📈</div>
            <h2>등가속도 운동</h2>
            <p>가속도에 따른 물체의 속도와 위치 변화를 정밀한 그래프와 함께 분석합니다.</p>
            <a href="acceleration.html" class="launch-btn">실험실 입장</a>
        </div>

        <div class="sim-card">
            <div class="sim-icon">⚖️</div>
            <h2>작용 · 반작용</h2>
            <p>두 물체의 충돌 시 발생하는 힘의 관계와 운동 에너지 보존을 실험합니다.</p>
            <a href="ActionAndReaction.html" class="launch-btn">실험실 입장</a>
        </div>

        <div class="sim-card pending">
            <div class="badge">추가 예정</div>
            <div class="sim-icon">아이콘</div>
            <h2>제목</h2>
            <p>설명</p>
            <a href="#" class="launch-btn btn-pending">추가 예정</a>
        </div>
        
        <div class="sim-card pending">
            <div class="badge">추가 예정</div>
            <div class="sim-icon">아이콘</div>
            <h2>제목</h2>
            <p>설명</p>
            <a href="#" class="launch-btn btn-pending">추가 예정</a>
        </div>
    </main>

    <footer>
        © 2026 Virtual Physics Lab. Designed for Science Education.
    </footer>

</body>
</html>
